<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin – Dåp Astrid</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --rose: #d4828f;
  --deep: #a85060;
  --cream: #fffaf9;
  --muted: #8a6a70;
  --text: #3a2a2e;
  --blush: #fce8ec;
}
body {
  font-family: 'Quicksand', sans-serif;
  background: #fdf4f5;
  color: var(--text);
  min-height: 100vh;
  padding: 24px 16px 60px;
}

/* LOGIN */
.login-wrap {
  max-width: 360px;
  margin: 80px auto;
  background: #fff;
  border-radius: 20px;
  padding: 40px 36px;
  box-shadow: 0 4px 30px rgba(150,70,90,.12);
  text-align: center;
}
.login-wrap h2 {
  font-size: 20px;
  color: var(--deep);
  margin-bottom: 24px;
  font-weight: 600;
}
.login-wrap input {
  width: 100%;
  padding: 13px 16px;
  border: 1.5px solid #f0c0c8;
  border-radius: 12px;
  font-family: 'Quicksand', sans-serif;
  font-size: 15px;
  outline: none;
  margin-bottom: 14px;
  color: var(--text);
}
.login-wrap input:focus { border-color: var(--rose); }
.btn-login {
  width: 100%;
  background: var(--rose);
  color: #fff;
  border: none;
  border-radius: 50px;
  padding: 14px;
  font-family: 'Quicksand', sans-serif;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: background .2s;
}
.btn-login:hover { background: var(--deep); }
.login-err { color: #c0392b; font-size: 13px; margin-top: 10px; }

/* DASHBOARD */
.dash { max-width: 860px; margin: 0 auto; display: none; }
.dash-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 28px;
  flex-wrap: wrap;
  gap: 12px;
}
.dash-header h1 { font-size: 22px; color: var(--deep); font-weight: 600; }
.dash-header p  { font-size: 14px; color: var(--muted); margin-top: 3px; }
.btn-logout {
  background: none;
  border: 1.5px solid #e0b0b8;
  color: var(--muted);
  border-radius: 50px;
  padding: 8px 18px;
  font-size: 13px;
  cursor: pointer;
  font-family: 'Quicksand', sans-serif;
}
.btn-logout:hover { background: var(--blush); }

/* LINK GENERATOR */
.link-box {
  background: #fff;
  border-radius: 16px;
  padding: 22px 24px;
  box-shadow: 0 2px 12px rgba(150,70,90,.08);
  margin-bottom: 24px;
}
.link-box h3 {
  font-size: 13px;
  font-weight: 600;
  color: var(--deep);
  text-transform: uppercase;
  letter-spacing: .1em;
  margin-bottom: 14px;
}
.link-row { display: flex; gap: 10px; flex-wrap: wrap; }
.link-row input {
  flex: 1;
  min-width: 200px;
  padding: 11px 14px;
  border: 1.5px solid #f0c0c8;
  border-radius: 10px;
  font-family: 'Quicksand', sans-serif;
  font-size: 14px;
  color: var(--text);
  outline: none;
}
.link-row input:focus { border-color: var(--rose); }
.btn-gen {
  background: var(--rose);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 11px 20px;
  font-family: 'Quicksand', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
}
.btn-gen:hover { background: var(--deep); }
.link-result {
  display: none;
  margin-top: 12px;
  background: #f0f8f0;
  border-radius: 10px;
  padding: 12px 16px;
  font-size: 13px;
  color: #3a5a3a;
  word-break: break-all;
  display: none;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.link-result.show { display: flex; }
.link-result a { color: #2e7d32; }
.btn-copy {
  background: #4caf50;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  font-family: 'Quicksand', sans-serif;
  white-space: nowrap;
}

/* STATS */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 14px;
  margin-bottom: 26px;
}
.stat {
  background: #fff;
  border-radius: 16px;
  padding: 20px 16px;
  text-align: center;
  box-shadow: 0 2px 12px rgba(150,70,90,.08);
}
.stat .n { font-size: 36px; font-weight: 700; color: var(--rose); }
.stat .l { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-top: 4px; }
.stat.yes .n { color: #4caf50; }
.stat.no  .n { color: #e57373; }

/* TABLE */
.table-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
  flex-wrap: wrap;
  gap: 10px;
}
.table-head span { font-size: 14px; color: var(--muted); }
.btn-csv {
  background: #fff;
  border: 1.5px solid var(--rose);
  color: var(--rose);
  border-radius: 50px;
  padding: 9px 22px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: 'Quicksand', sans-serif;
}
.btn-csv:hover { background: var(--blush); }
.table-wrap {
  background: #fff;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(150,70,90,.08);
  overflow-x: auto;
}
table { width: 100%; border-collapse: collapse; min-width: 480px; }
thead { background: var(--blush); }
th {
  padding: 14px 18px;
  text-align: left;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--muted);
}
td {
  padding: 13px 18px;
  font-size: 14px;
  border-top: 1px solid #fce8ec;
  vertical-align: top;
}
.badge {
  display: inline-block;
  padding: 3px 12px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 600;
}
.badge.yes { background: #e8f5e9; color: #2e7d32; }
.badge.no  { background: #ffebee; color: #c62828; }
td .muted  { color: #bbb; font-style: italic; }
.loading   { text-align: center; padding: 48px; color: var(--muted); font-size: 15px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <h2>🌸 Admin – Dåp Astrid</h2>
  <input type="password" id="pwInput" placeholder="Passord" onkeydown="if(event.key==='Enter') login()">
  <button class="btn-login" onclick="login()">Logg inn</button>
  <p class="login-err" id="loginErr"></p>
</div>

<!-- DASHBOARD -->
<div class="dash" id="dash">

  <div class="dash-header">
    <div>
      <h1>Dåpsinvitasjon – Astrid Louise</h1>
      <p>Oversikt over svar fra gjester</p>
    </div>
    <button class="btn-logout" onclick="logout()">Logg ut</button>
  </div>

  <!-- Link generator -->
  <div class="link-box">
    <h3>Lag gjeste-lenke</h3>
    <div class="link-row">
      <input type="text" id="nameInput" placeholder="Gjestenavn, f.eks. Mormor eller Familie Hansen">
      <button class="btn-gen" onclick="generateLink()">Lag lenke</button>
    </div>
    <div class="link-result" id="linkResult">
      <a id="linkHref" href="#" target="_blank"></a>
      <button class="btn-copy" id="copyBtn" onclick="copyLink()">Kopier</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="n" id="sTotal">–</div>
      <div class="l">Svar totalt</div>
    </div>
    <div class="stat yes">
      <div class="n" id="sYes">–</div>
      <div class="l">Kommer</div>
    </div>
    <div class="stat no">
      <div class="n" id="sNo">–</div>
      <div class="l">Kan ikke komme</div>
    </div>
  </div>

  <!-- Table -->
  <div class="table-head">
    <span id="tableLabel">Laster...</span>
    <button class="btn-csv" onclick="exportCSV()">Last ned CSV</button>
  </div>
  <div class="table-wrap" id="tableWrap">
    <div class="loading">Henter svar...</div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://esubtibaucuzkzdaolge.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzdWJ0aWJhdWN1emt6ZGFvbGdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMjY1NTUsImV4cCI6MjA5MTcwMjU1NX0.ow8GbbGMiOlgNwvI0jZ2O38lHs8h7S6h7g4AwapVVWg';
const PASSWORD = 'dåp2025';
let rsvps = [];
let currentLink = '';

function login() {
  const pw = document.getElementById('pwInput').value;
  if (pw === PASSWORD) {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('dash').style.display = 'block';
    loadRsvps();
  } else {
    document.getElementById('loginErr').textContent = 'Feil passord – prøv igjen.';
  }
}

function logout() {
  document.getElementById('loginWrap').style.display = 'block';
  document.getElementById('dash').style.display = 'none';
  document.getElementById('pwInput').value = '';
  document.getElementById('loginErr').textContent = '';
}

async function loadRsvps() {
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/rsvps?select=*&order=created_at.desc', {
      headers: {
        'apikey':        SUPABASE_ANON,
        'Authorization': 'Bearer ' + SUPABASE_ANON
      }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    rsvps = await res.json();
    renderDashboard();
  } catch (e) {
    document.getElementById('tableWrap').innerHTML =
      '<div class="loading" style="color:#c62828">Kunne ikke hente data.<br>Sjekk at SUPABASE_URL og SUPABASE_ANON er riktig i config.js</div>';
  }
}

function renderDashboard() {
  const yes = rsvps.filter(r => r.attending).length;
  const no  = rsvps.filter(r => !r.attending).length;

  document.getElementById('sTotal').textContent = rsvps.length;
  document.getElementById('sYes').textContent   = yes;
  document.getElementById('sNo').textContent    = no;
  document.getElementById('tableLabel').textContent = rsvps.length + ' svar totalt';

  if (rsvps.length === 0) {
    document.getElementById('tableWrap').innerHTML = '<div class="loading">Ingen svar ennå.</div>';
    return;
  }

  const rows = rsvps.map(r => {
    const d    = new Date(r.created_at);
    const dato = d.toLocaleDateString('no-NO', { day: '2-digit', month: '2-digit', year: 'numeric' });
    const tid  = d.toLocaleTimeString('no-NO', { hour: '2-digit', minute: '2-digit' });
    return `<tr>
      <td><strong>${esc(r.guest_name)}</strong></td>
      <td><span class="badge ${r.attending ? 'yes' : 'no'}">${r.attending ? 'Kommer' : 'Kan ikke'}</span></td>
      <td>${r.message ? esc(r.message) : '<span class="muted">–</span>'}</td>
      <td style="color:#aaa;font-size:13px;white-space:nowrap">${dato} ${tid}</td>
    </tr>`;
  }).join('');

  document.getElementById('tableWrap').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Navn</th>
          <th>Svar</th>
          <th>Melding</th>
          <th>Tidspunkt</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function generateLink() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) return;
  const encoded = encodeURIComponent(name).replace(/%20/g, '+');
  const base    = window.location.origin;
  currentLink   = base + '/?gjest=' + encoded;
  const el      = document.getElementById('linkHref');
  el.textContent = currentLink;
  el.href        = currentLink;
  document.getElementById('linkResult').classList.add('show');
  document.getElementById('copyBtn').textContent = 'Kopier';
}

function copyLink() {
  navigator.clipboard.writeText(currentLink).then(() => {
    document.getElementById('copyBtn').textContent = 'Kopiert!';
    setTimeout(() => { document.getElementById('copyBtn').textContent = 'Kopier'; }, 2000);
  });
}

function exportCSV() {
  if (!rsvps.length) return alert('Ingen data å eksportere.');
  const header = ['Navn', 'Svar', 'Melding', 'Tidspunkt'];
  const rows   = rsvps.map(r => [
    '"' + r.guest_name + '"',
    r.attending ? 'Kommer' : 'Kan ikke',
    '"' + (r.message || '').replace(/"/g, '""') + '"',
    new Date(r.created_at).toLocaleString('no-NO')
  ]);
  const csv  = [header, ...rows].map(r => r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = 'rsvp-daap-astrid.csv';
  a.click();
}
</script>
</body>
</html>
