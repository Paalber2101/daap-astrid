<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin – Dåp Astrid</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#fdf6f7;color:#3a2a2e;min-height:100vh;padding:24px 16px}
h1{font-size:20px;font-weight:600;color:#a85060;margin-bottom:4px}
.sub{font-size:14px;color:#8a6a70;margin-bottom:28px}
.login-wrap{max-width:360px;margin:80px auto;background:#fff;border-radius:16px;padding:36px;box-shadow:0 4px 24px rgba(150,70,90,.1)}
.login-wrap h2{font-size:18px;color:#a85060;margin-bottom:20px;text-align:center}
input[type=password]{width:100%;padding:12px 14px;border:1.5px solid #f0c0c8;border-radius:10px;font-size:15px;outline:none;margin-bottom:14px}
input[type=password]:focus{border-color:#d4828f}
.btn-login{width:100%;background:#d4828f;color:#fff;border:none;border-radius:50px;padding:13px;font-size:15px;cursor:pointer}
.btn-login:hover{background:#a85060}
.err{color:#c0392b;font-size:13px;margin-top:8px;text-align:center}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:28px}
.stat{background:#fff;border-radius:14px;padding:18px;text-align:center;box-shadow:0 2px 10px rgba(150,70,90,.08)}
.stat .n{font-size:32px;font-weight:700;color:#d4828f}
.stat .l{font-size:12px;color:#8a6a70;text-transform:uppercase;letter-spacing:.08em;margin-top:4px}
.stat.yes .n{color:#4caf50}
.stat.no .n{color:#e57373}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 10px rgba(150,70,90,.08)}
thead{background:#fce8ec}
th{padding:14px 16px;text-align:left;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#8a6a70}
td{padding:13px 16px;font-size:14px;border-top:1px solid #fce8ec}
.badge{display:inline-block;padding:3px 12px;border-radius:50px;font-size:12px;font-weight:600}
.badge.yes{background:#e8f5e9;color:#388e3c}
.badge.no{background:#ffebee;color:#c62828}
.muted{color:#aaa;font-style:italic}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.btn-export{background:#fff;border:1.5px solid #d4828f;color:#d4828f;border-radius:50px;padding:9px 20px;font-size:13px;cursor:pointer;font-weight:500}
.btn-export:hover{background:#fce8ec}
.btn-logout{background:transparent;border:none;color:#8a6a70;font-size:13px;cursor:pointer;text-decoration:underline}
.link-gen{background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 10px rgba(150,70,90,.08);margin-bottom:24px}
.link-gen h3{font-size:14px;font-weight:600;color:#a85060;margin-bottom:12px;text-transform:uppercase;letter-spacing:.08em}
.link-row{display:flex;gap:10px;flex-wrap:wrap}
.link-row input{flex:1;min-width:180px;padding:10px 14px;border:1.5px solid #f0c0c8;border-radius:10px;font-size:14px;outline:none}
.link-row input:focus{border-color:#d4828f}
.btn-copy{background:#d4828f;color:#fff;border:none;border-radius:10px;padding:10px 18px;font-size:14px;cursor:pointer;white-space:nowrap}
.btn-copy:hover{background:#a85060}
.link-out{margin-top:10px;font-size:13px;color:#5a7a5a;background:#f0f8f0;padding:10px 14px;border-radius:8px;word-break:break-all;display:none}
.loading{text-align:center;padding:40px;color:#8a6a70}
@media(max-width:500px){th,td{padding:10px 10px}th:nth-child(4),td:nth-child(4){display:none}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <h2>🌸 Admin – Dåp Astrid</h2>
  <input type="password" id="pwInput" placeholder="Passord" onkeydown="if(event.key==='Enter')login()">
  <button class="btn-login" onclick="login()">Logg inn</button>
  <div class="err" id="loginErr"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;max-width:900px;margin:0 auto">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px">
    <div>
      <h1>Dåpsinvitasjon – Astrid Louise</h1>
      <div class="sub">Oversikt over svar fra gjester</div>
    </div>
    <button class="btn-logout" onclick="logout()">Logg ut</button>
  </div>

  <!-- LENKE-GENERATOR -->
  <div class="link-gen">
    <h3>Lag gjeste-lenke</h3>
    <div class="link-row">
      <input type="text" id="guestInput" placeholder="Skriv gjestenavn, f.eks. Mormor eller Familie Hansen">
      <button class="btn-copy" onclick="generateLink()">Lag lenke</button>
    </div>
    <div class="link-out" id="linkOut"></div>
  </div>

  <!-- STATS -->
  <div class="stats" id="stats">
    <div class="stat"><div class="n" id="sTotal">–</div><div class="l">Totalt invitert</div></div>
    <div class="stat yes"><div class="n" id="sYes">–</div><div class="l">Kommer</div></div>
    <div class="stat no"><div class="n" id="sNo">–</div><div class="l">Kan ikke komme</div></div>
  </div>

  <!-- TABLE -->
  <div class="toolbar">
    <span style="font-size:14px;color:#8a6a70" id="tableLabel">Laster svar...</span>
    <button class="btn-export" onclick="exportCSV()">Last ned CSV</button>
  </div>
  <div id="tableWrap"><div class="loading">Henter svar...</div></div>
</div>

<script>
// ============================================================
// KONFIGURER DISSE TO LINJENE med dine Supabase-verdier:
const SUPABASE_URL = 'https://DITT-PROSJEKT.supabase.co';
const SUPABASE_ANON_KEY = 'din-anon-nøkkel-her';
// ============================================================

const PASSWORD = 'dåp2025';
let rsvps = [];

function login() {
  const pw = document.getElementById('pwInput').value;
  if (pw === PASSWORD) {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadRsvps();
  } else {
    document.getElementById('loginErr').textContent = 'Feil passord. Prøv igjen.';
  }
}

function logout() {
  document.getElementById('loginWrap').style.display = 'block';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('pwInput').value = '';
}

async function loadRsvps() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/rsvps?select=*&order=created_at.desc`, {
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Content-Type': 'application/json'
      }
    });
    rsvps = await res.json();
    renderDashboard();
  } catch (e) {
    document.getElementById('tableWrap').innerHTML =
      '<div class="loading" style="color:#c0392b">Kunne ikke hente data. Sjekk Supabase-konfigurasjonen.</div>';
  }
}

function renderDashboard() {
  const yes = rsvps.filter(r => r.attending).length;
  const no = rsvps.filter(r => !r.attending).length;
  document.getElementById('sTotal').textContent = rsvps.length;
  document.getElementById('sYes').textContent = yes;
  document.getElementById('sNo').textContent = no;
  document.getElementById('tableLabel').textContent = `${rsvps.length} svar totalt`;

  if (rsvps.length === 0) {
    document.getElementById('tableWrap').innerHTML = '<div class="loading">Ingen svar ennå.</div>';
    return;
  }

  const rows = rsvps.map(r => {
    const d = new Date(r.created_at);
    const dato = d.toLocaleDateString('no-NO', {day:'2-digit',month:'2-digit',year:'numeric'});
    const tid = d.toLocaleTimeString('no-NO', {hour:'2-digit',minute:'2-digit'});
    return `<tr>
      <td><strong>${esc(r.guest_name)}</strong></td>
      <td><span class="badge ${r.attending?'yes':'no'}">${r.attending?'Kommer':'Kan ikke'}</span></td>
      <td>${r.message ? esc(r.message) : '<span class="muted">–</span>'}</td>
      <td style="color:#aaa;font-size:13px">${dato} ${tid}</td>
    </tr>`;
  }).join('');

  document.getElementById('tableWrap').innerHTML = `
    <table>
      <thead><tr><th>Navn</th><th>Svar</th><th>Melding</th><th>Tidspunkt</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function generateLink() {
  const name = document.getElementById('guestInput').value.trim();
  if (!name) return;
  const encoded = encodeURIComponent(name).replace(/%20/g, '+');
  const base = window.location.origin + '/index.html';
  const url = `${base}?gjest=${encoded}`;
  const out = document.getElementById('linkOut');
  out.style.display = 'block';
  out.innerHTML = `<strong>${name}:</strong> <a href="${url}" target="_blank">${url}</a>
    <button onclick="navigator.clipboard.writeText('${url}').then(()=>this.textContent='Kopiert!').catch(()=>{})"
      style="margin-left:10px;background:#d4828f;color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer">Kopier</button>`;
}

function exportCSV() {
  if (!rsvps.length) return alert('Ingen data å eksportere.');
  const header = ['Navn', 'Svar', 'Melding', 'Tidspunkt'];
  const rows = rsvps.map(r => [
    `"${r.guest_name}"`,
    r.attending ? 'Kommer' : 'Kan ikke',
    `"${(r.message||'').replace(/"/g,'""')}"`,
    new Date(r.created_at).toLocaleString('no-NO')
  ]);
  const csv = [header, ...rows].map(r => r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'rsvp-daap-astrid.csv';
  a.click();
}
</script>
</body>
</html>
